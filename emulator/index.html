<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Pocket Deck Emulator</title>
  <link href="./fonts/webfonts/fonts.css" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {
        colors: {
          "on-surface": "#e9e9ec", "primary": "#b9b9bd", "on-primary": "#1a1a1f",
          "primary-container": "#34343c", "surface": "#2e2e37",
          "surface-container": "#1e1e24", "surface-container-high": "#26262d",
          "surface-container-highest": "#2e2e36", "surface-container-low": "#141418",
          "on-surface-variant": "#a6a6ae", "outline": "#7c7c85",
          "outline-variant": "#babab0", "secondary": "#4f6966",
          "secondary-container": "#cbe8e3", "on-secondary-container": "#3c5753",
          "on-secondary": "#ffffff", "success": "#34C759", "error": "#FF3B30",
        },
        fontFamily: { headline: ["Newsreader"], body: ["Work Sans"], label: ["Space Grotesk"] },
        borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem",
          full: "9999px", ios: "10px", "ios-lg": "14px" },
      }},
    };
  </script>
  <script src="./fonts/t0_15_me.js"></script>
  <script src="./fonts/t0_15b_me.js"></script>
  <script src="./fonts/u8g2font.js"></script>
  <script src="./fonts/unifont_large.js" defer></script>
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal; font-style: normal; line-height: 1;
      letter-spacing: normal; text-transform: none; display: inline-block;
      white-space: nowrap; word-wrap: normal; direction: ltr;
      -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
      font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
    }
    /* Custom theme tokens — defined here so they work regardless of whether
       Tailwind's Play CDN applies the tailwind.config custom theme. */
    .text-on-surface         { color: #e9e9ec }
    .text-on-surface-variant { color: #a6a6ae }
    .text-outline            { color: #7c7c85 }
    .text-on-primary         { color: #1a1a1f }
    .bg-surface              { background-color: #2e2e37 }
    .bg-surface-container    { background-color: #1e1e24 }
    .bg-surface-container-high     { background-color: #26262d }
    .bg-surface-container-highest  { background-color: #2e2e36 }
    .bg-surface-container-low      { background-color: #141418 }
    .bg-primary-container    { background-color: #34343c }
    .rounded-ios             { border-radius: 10px }
    .rounded-ios-lg          { border-radius: 14px }
    .font-headline           { font-family: Newsreader, serif }
    .font-body               { font-family: 'Work Sans', sans-serif }
    .font-label              { font-family: 'Space Grotesk', sans-serif }
    /* Always reserve the scrollbar gutter so the page width — and therefore the
       w-full device artwork's scale — never changes when a scrollbar appears or
       disappears (e.g. as content height shifts between app launches). */
    html { scrollbar-gutter: stable; }
    body { background:#22222a; color:#e9e9ec; -webkit-tap-highlight-color:transparent; }
    /* The screen is a real 400×240 monochrome framebuffer scaled up crisply,
       fitted (aspect-preserved) into the device artwork's screen rectangle. */
    /* Device sized so its screen rectangle (45.3% wide) is the native 400px,
       i.e. 400 / 0.453 ≈ 884px. The framebuffer then renders 1:1 (an exact ÷SS
       downscale of the supersampled backing store) — pixel-perfect, no blur. */
    #device { max-width:884px; }
    /* Fill the screen cutout exactly. The cutout's aspect (≈1.61) is slightly
       taller than the 400×240 framebuffer (1.667) — the real LCD's pixels aren't
       perfectly square either — so stretching to fill matches the device rather
       than leaving letterbox margins inside the bezel. */
    #screenCanvas { width:100%; height:100%; image-rendering:auto; display:block; background:#000; }
    .ios-list-item { padding:12px 16px; display:flex; align-items:center;
      justify-content:space-between; border-bottom:.5px solid rgba(255,255,255,.08); }
    .ios-list-item:last-child { border-bottom:none; }
    #loading-overlay { display:none; }
    #loading-overlay.show { display:flex; }

    /* ── On-screen controls overlaid on the artwork ──────────────────────────
       Transparent hit-areas positioned (in %) over the golden buttons / slider
       in device_front.png. They light up with a gold glow while pressed and
       feed the same key channel as the physical keyboard. */
    .dev-btn { position:absolute; aspect-ratio:1; border-radius:9999px;
      transform:translate(-50%,-50%); cursor:pointer; touch-action:none; z-index:5; }
    .dev-btn::after { content:''; position:absolute; inset:6%; border-radius:9999px;
      background:rgba(255,214,120,0); box-shadow:0 0 0 0 rgba(255,200,110,0);
      transition:background .06s, box-shadow .06s; }
    .dev-btn.pressed::after { background:rgba(255,224,140,.5);
      box-shadow:0 0 16px 5px rgba(255,200,110,.55); }
    .dev-slider { position:absolute; cursor:ns-resize; touch-action:none;
      border-radius:9999px; z-index:5; }
    .dev-thumb { position:absolute; left:50%; top:0; width:75%; height:7%;
      transform:translate(-50%,-50%); border-radius:9999px;
      background:rgba(255,224,140,0); box-shadow:0 0 0 0 rgba(255,200,110,0);
      transition:background .06s, box-shadow .06s; }
    .dev-slider.active .dev-thumb { background:rgba(255,224,140,.85);
      box-shadow:0 0 14px 4px rgba(255,200,110,.6); }
  </style>
</head>
<body class="font-body min-h-screen">

<main class="pb-32 max-w-[940px] mx-auto">

  <div class="px-4 pt-6 pb-2">
    <h1 class="font-headline text-[34px] font-extrabold tracking-tight text-on-surface">
      Pocket Deck <span class="font-normal opacity-60">Emulator</span>
    </h1>
    <p class="font-body text-[14px] text-on-surface-variant mt-1">
      Try Pocket deck Home app and PEM editor.
    </p>
  </div>

  <!-- Screen: the 400×240 framebuffer is overlaid on the device front-panel
       artwork, fitted into its screen rectangle (measured from device_front.png). -->
  <section class="px-4 mt-4">
    <div id="device" class="relative mx-auto select-none">
      <img src="./device_front.png" alt="Pocket Deck" draggable="false"
           class="w-full block pointer-events-none rounded-ios-lg shadow-2xl shadow-black/60 ring-1 ring-white/10"/>
      <!-- Screen cutout, measured from device_front.png (the pure-black rectangle):
           left 27.50%, top 9.95%, width 45.28%, height 44.62%. -->
      <div id="screen-area"
           class="absolute flex items-center justify-center overflow-hidden"
           style="left:27.50%; top:9.95%; width:45.28%; height:44.62%;">
        <canvas id="screenCanvas" width="400" height="240"></canvas>
        <div id="loading-overlay"
             class="absolute inset-0 flex-col items-center justify-center bg-black/80 text-white gap-3">
          <div class="w-7 h-7 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
          <p id="loading-text" class="font-label text-[10px] uppercase tracking-widest opacity-60">Loading…</p>
        </div>
      </div>

      <!-- Clickable controls over the golden buttons / slider (positions measured
           from device_front.png). D-pad → arrow keys, A → Enter, B → Backspace.
           The slider scrolls (up/down) in raw mode and reports an analog position
           to apps (e.g. home's menu) otherwise. See the control wiring below. -->
      <div id="btn-up"    class="dev-btn" style="left:14.7%; top:50.9%; width:8%;"  aria-label="Up"></div>
      <div id="btn-down"  class="dev-btn" style="left:14.7%; top:70.4%; width:8%;"  aria-label="Down"></div>
      <div id="btn-left"  class="dev-btn" style="left:8.0%;  top:60.6%; width:8%;"  aria-label="Left"></div>
      <div id="btn-right" class="dev-btn" style="left:21.5%; top:60.6%; width:8%;"  aria-label="Right"></div>
      <div id="btn-a"     class="dev-btn" style="left:93.4%; top:64.4%; width:7%;"  aria-label="A (Enter)"></div>
      <div id="btn-b"     class="dev-btn" style="left:83.7%; top:72.8%; width:7%;"  aria-label="B (Backspace)"></div>
      <div id="slider-track" class="dev-slider" style="left:73.5%; top:23.5%; width:6%; height:31%;" aria-label="Slider">
        <div id="slider-thumb" class="dev-thumb"></div>
      </div>
    </div>
    <div class="flex justify-between items-center px-1 mt-2">
      <p class="font-label text-[10px] uppercase tracking-widest text-outline">400 × 240 · 1-bit Mono</p>
      <p class="font-label text-[10px] uppercase tracking-widest text-outline">
        <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-outline mr-1 align-middle"></span>
        <span id="status-text">Idle</span>
      </p>
    </div>
  </section>

  <!-- App list -->
  <section class="mt-6">
    <h3 class="px-8 font-label text-[13px] uppercase tracking-wider text-outline mb-2">Tap an app to run</h3>
    <div class="mx-4 bg-surface rounded-ios-lg border border-black/5 shadow-sm overflow-hidden">
      <div id="builtin-list"></div>
    </div>
  </section>

  <!-- Console -->
  <section class="px-4 mt-6">
    <div class="flex justify-between items-center mb-2">
      <p class="font-label text-[9px] uppercase tracking-widest text-outline">Console</p>
      <button id="clear-console" class="material-symbols-outlined text-outline text-[16px]">delete_sweep</button>
    </div>
    <!-- Fixed height (not max-height): the console must not grow as log lines
         accumulate, or the page height would shift between app launches. -->
    <div id="console-out"
         class="bg-[#1a1a1a] rounded-ios p-3 text-[11px] text-green-400 overflow-y-auto"
         style="height:110px;font-family:'Courier New',monospace"></div>
  </section>

</main>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  Cross-Origin Isolation (enables SharedArrayBuffer)
// ════════════════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./coi-serviceworker.js').then(() => {
    if (!navigator.serviceWorker.controller && !sessionStorage.getItem('coi-reloaded')) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        sessionStorage.setItem('coi-reloaded', '1');
        window.location.reload();
      });
    }
  });
}

// ════════════════════════════════════════════════════════════════════════════
//  Display — one 400×240 monochrome framebuffer for both CLI and GUI.
//  Everything is drawn in grayscale into an offscreen buffer, then converted to
//  pure black & white with a 4×4 ordered (Bayer) dither on present().
// ════════════════════════════════════════════════════════════════════════════
const W = 400, H = 240;
// The framebuffer is computed at the native 400×240, then blitted nearest-neighbour
// onto an SS× display canvas. The browser therefore only ever *downscales* that
// crisp high-res image to the on-screen size — smooth and legible at any box size —
// instead of doing a lossy non-integer downscale straight from 400×240 (which drops
// whole pixel columns and mangles the text).
const SS = 3;
const screenCanvas = document.getElementById('screenCanvas');
screenCanvas.width = W * SS; screenCanvas.height = H * SS;
const sctx = screenCanvas.getContext('2d');
sctx.imageSmoothingEnabled = false;

// Two offscreen layers, matching the device's two render paths:
//   gctx  — shapes/fills, drawn in grayscale → ordered-dithered to 1-bit
//   tctx  — text, drawn solid (1-bit, no dither) → composited crisply on top
const gbuf = document.createElement('canvas'); gbuf.width = W; gbuf.height = H;
const gctx = gbuf.getContext('2d', { willReadFrequently: true });
const tbuf = document.createElement('canvas'); tbuf.width = W; tbuf.height = H;
const tctx = tbuf.getContext('2d', { willReadFrequently: true });

// Scratch canvas receives the computed 400×240 frame; present() scales it up.
const oscr = document.createElement('canvas'); oscr.width = W; oscr.height = H;
const octx = oscr.getContext('2d');
const outImg = octx.createImageData(W, H);
const outBuf = outImg.data;

// 4×4 Bayer threshold matrix (values 0..15)
const BAYER = [0,8,2,10, 12,4,14,6, 3,11,1,9, 15,7,13,5];

// ── Screen palette ──  Change these two lines to recolor the whole screen.
//   LCD_ON  = lit pixels (device draw_color 1)
//   LCD_OFF = background (device draw_color 0)
// Presets (uncomment one):
//   netserver white/black : [255,255,255] / [0,0,0]
//   backlit blue LCD      : [207,232,255] / [10,22,34]
//   green phosphor LCD    : [183,227,176] / [13,22,12]
  //   reflective gray LCD   : [26,31,26]    / [174,185,165]
  const LCD_ON  = [174,185,165]   // lit pixel
  const LCD_OFF = [26,31,26];      // background

let displayInverted = true;   // pdeck.screen_invert()

function present() {
  const fill = gctx.getImageData(0, 0, W, H).data;
  const text = tctx.getImageData(0, 0, W, H).data;
  for (let y = 0; y < H; y++) {
    const brow = (y & 3) * 4;
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;
      let lit;
      if (text[i+3] > 127) {
        // Text pixel: solid 1-bit, crisp (no dithering)
        lit = text[i] >= 128;
      } else {
        // Fill pixel: ordered dither of the grayscale value
        const lum = (fill[i]*0.299 + fill[i+1]*0.587 + fill[i+2]*0.114) * (fill[i+3]/255);
        lit = lum >= (BAYER[brow + (x & 3)] + 0.5) * 16;
      }
      if (displayInverted) lit = !lit;
      const c = lit ? LCD_ON : LCD_OFF;
      outBuf[i] = c[0]; outBuf[i+1] = c[1]; outBuf[i+2] = c[2]; outBuf[i+3] = 255;
    }
  }
  octx.putImageData(outImg, 0, 0);
  sctx.drawImage(oscr, 0, 0, W, H, 0, 0, W * SS, H * SS);   // crisp nearest-neighbour ×SS
}

function clearGray() {
  gctx.globalCompositeOperation = 'source-over';
  gctx.fillStyle = '#000000';
  gctx.fillRect(0, 0, W, H);
  tctx.clearRect(0, 0, W, H);   // text layer transparent where there is no glyph
}

// ── Graphics renderer (replays draw-command batches into the gray buffer) ─────
// u8g2's default text reference is the BASELINE (draw_str y = baseline), so the
// canvas default must be 'alphabetic', not 'top'.
const DEFAULT_FONT = '12px "Courier New",monospace';
let curColor = 1, curDither = 16, curFont = DEFAULT_FONT, curBaseline = 'alphabetic';
function resetRenderState() {
  curColor = 1; curDither = 16; curFont = DEFAULT_FONT; curBaseline = 'alphabetic';
}
function fg() {
  if (curDither === 0) return 'rgba(0,0,0,0)';
  const a = curDither / 16;
  if (curColor === 1) return a < 1 ? `rgba(255,255,255,${a})` : '#ffffff';
  return a < 1 ? `rgba(0,0,0,${a})` : '#000000';
}
function renderFrame(cmds) {
  clearGray();
  const ctx = gctx;
  for (const c of cmds) {
    switch (c[0]) {
      case 'col':   curColor = c[1];
        ctx.globalCompositeOperation = (c[1] === 2) ? 'xor' : 'source-over'; break;
      case 'dith':  curDither = c[1]; break;
      case 'font':  curFont = c[1]; break;
      case 'base':  curBaseline = c[1]; break;
      case 'box':   ctx.fillStyle = fg(); ctx.fillRect(c[1], c[2], c[3], c[4]);
                    // A background (color 0) box erases everything underneath on
                    // the real one-buffer display — including text drawn earlier
                    // this frame (e.g. home's draw_help() erase bar over the menu).
                    // Mirror that by clearing the same region of the text layer.
                    if (curColor === 0) tctx.clearRect(c[1], c[2], c[3], c[4]); break;
      case 'frame': ctx.strokeStyle = fg(); ctx.lineWidth = 1;
                    ctx.strokeRect(c[1]+0.5, c[2]+0.5, c[3]-1, c[4]-1); break;
      case 'line':  ctx.strokeStyle = fg(); ctx.lineWidth = 1; ctx.beginPath();
                    ctx.moveTo(c[1], c[2]); ctx.lineTo(c[3], c[4]); ctx.stroke(); break;
      case 'rbox':  rrect(c[1], c[2], c[3], c[4], c[5], true);
                    if (curColor === 0) tctx.clearRect(c[1], c[2], c[3], c[4]); break;
      case 'rframe':rrect(c[1], c[2], c[3], c[4], c[5], false); break;
      case 'circ':  ctx.strokeStyle = fg(); ctx.lineWidth = 1; ctx.beginPath();
                    ctx.arc(c[1], c[2], c[3], 0, 2*Math.PI); ctx.stroke(); break;
      case 'disc':  ctx.fillStyle = fg(); ctx.beginPath();
                    ctx.arc(c[1], c[2], c[3], 0, 2*Math.PI); ctx.fill(); break;
      case 'arc':   ctx.strokeStyle = fg(); ctx.lineWidth = 1; ctx.beginPath();
                    ctx.arc(c[1], c[2], c[3], c[4]*Math.PI/180, c[5]*Math.PI/180); ctx.stroke(); break;
      case 'tri':   ctx.fillStyle = fg(); ctx.beginPath();
                    ctx.moveTo(c[1],c[2]); ctx.lineTo(c[3],c[4]); ctx.lineTo(c[5],c[6]);
                    ctx.closePath(); ctx.fill(); break;
      case 'ell':   ctx.beginPath(); ctx.ellipse(c[1],c[2],c[3],c[4],0,0,2*Math.PI);
                    if (c[5]) { ctx.fillStyle = fg(); ctx.fill(); }
                    else { ctx.strokeStyle = fg(); ctx.lineWidth = 1; ctx.stroke(); } break;
      case 'poly':  drawPoly(c[1]); break;
      case 'str':   tctx.font = curFont; tctx.textBaseline = curBaseline;
                    tctx.fillStyle = curColor === 0 ? '#000000' : '#ffffff';
                    tctx.fillText(c[3], c[1], c[2]); break;
      case 'vstr':  tctx.save(); tctx.translate(c[1], c[2]); tctx.rotate(Math.PI/2);
                    tctx.font = curFont; tctx.textBaseline = curBaseline;
                    tctx.fillStyle = curColor === 0 ? '#000000' : '#ffffff';
                    tctx.fillText(c[3], 0, 0); tctx.restore(); break;
      case 'faces': drawFaces(c[1]); break;
      case 'xbm':   drawXbm(c[1], c[2], c[3], c[4], c[5]); break;
    }
  }
  present();
}
function rrect(x, y, w, h, r, fill) {
  r = Math.min(r, w/2, h/2);
  gctx.beginPath();
  gctx.moveTo(x+r, y); gctx.arcTo(x+w, y, x+w, y+h, r);
  gctx.arcTo(x+w, y+h, x, y+h, r); gctx.arcTo(x, y+h, x, y, r);
  gctx.arcTo(x, y, x+w, y, r); gctx.closePath();
  if (fill) { gctx.fillStyle = fg(); gctx.fill(); }
  else { gctx.strokeStyle = fg(); gctx.lineWidth = 1; gctx.stroke(); }
}
function drawPoly(pts) {
  const n = pts.length / 2;
  gctx.beginPath(); gctx.moveTo(pts[0], pts[n]);
  for (let i = 1; i < n; i++) gctx.lineTo(pts[i], pts[n+i]);
  gctx.closePath(); gctx.fillStyle = fg(); gctx.fill();
}
function drawFaces(faces) {
  for (const f of faces) {
    gctx.beginPath();
    gctx.moveTo(f[1], f[4]); gctx.lineTo(f[2], f[5]); gctx.lineTo(f[3], f[6]);
    gctx.closePath();
    gctx.fillStyle = `rgba(255,255,255,${f[0]/16})`; gctx.fill();
  }
}
function drawXbm(x, y, w, h, bytes) {
  const stride = (w + 7) >> 3;
  const img = gctx.createImageData(w, h), d = img.data;
  for (let row = 0; row < h; row++)
    for (let col = 0; col < w; col++) {
      const bit = (bytes[row*stride + (col>>3)] >> (7 - (col & 7))) & 1;
      const v = bit ? 255 : 0, i = (row*w + col)*4;
      d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
    }
  gctx.putImageData(img, x, y);
}

// ── Monochrome terminal (CLI rendered with the device's u8g2 t0_15_me font) ──
// Matches displayapi.c display_set_font_size(0): t0_15_me, 8×16 cell → 50×15.
const sysFont  = new U8g2Font(window.U8G2_T0_15_ME);
const boldFont = new U8g2Font(window.U8G2_T0_15B_ME);
// GNU Unifont (CJK) is loaded async (large); build it lazily once available.
const UNI_BASE = 14;        // baseline row for the 16px unifont glyph within the cell
let _jpFont = null;
function getJpFont() {
  if (!_jpFont && window.U8G2_UNIFONT_LARGE) _jpFont = new U8g2Font(window.U8G2_UNIFONT_LARGE);
  return _jpFont;
}
const CW = 8, CH = 16, COLS = Math.floor(W / CW), ROWS = Math.floor(H / CH); // 50 × 15
const ATTR_BOLD = 1, ATTR_REVERSE = 2, ATTR_UNDERLINE = 4;   // per-cell attribute bits

// East-Asian wide characters occupy two terminal cells (the device's CJK font is
// 16px = 2×8 cells). The bundled u8g2 terminal font is Latin-only, so these are
// drawn with the host browser's CJK font instead (see render()). WIDE_CONT marks
// the right-hand cell a wide glyph spills into so it isn't drawn or counted twice.
const WIDE_CONT = '\u0000';
function isWideChar(cp) {
  return (cp >= 0x1100 && cp <= 0x115F) ||   // Hangul Jamo
         (cp >= 0x2E80 && cp <= 0x303E) ||   // CJK radicals, Kangxi, punctuation
         (cp >= 0x3041 && cp <= 0x33FF) ||   // Hiragana, Katakana, CJK symbols
         (cp >= 0x3400 && cp <= 0x4DBF) ||   // CJK Ext A
         (cp >= 0x4E00 && cp <= 0x9FFF) ||   // CJK Unified Ideographs
         (cp >= 0xA000 && cp <= 0xA4CF) ||   // Yi
         (cp >= 0xAC00 && cp <= 0xD7A3) ||   // Hangul syllables
         (cp >= 0xF900 && cp <= 0xFAFF) ||   // CJK compat ideographs
         (cp >= 0xFE30 && cp <= 0xFE4F) ||   // CJK compat forms
         (cp >= 0xFF00 && cp <= 0xFF60) ||   // Fullwidth forms
         (cp >= 0xFFE0 && cp <= 0xFFE6) ||   // Fullwidth signs
         (cp >= 0x20000 && cp <= 0x3FFFD);   // CJK Ext B+
}
const CJK_FONT = '15px "Noto Sans CJK JP","Hiragana Kaku Gothic ProN","Yu Gothic","MS Gothic","SimSun",sans-serif';

class MonoTerminal {
  constructor() {
    this.cells = new Array(COLS * ROWS).fill(' ');
    this.attrs = new Uint8Array(COLS * ROWS);
    this.cx = 0; this.cy = 0;
    this.cursorVisible = true;
    this.curAttr = 0;        // SGR state applied to newly written cells
    this.esc = '';           // pending escape-sequence buffer
  }
  reset() { this.cells.fill(' '); this.attrs.fill(0); this.cx = 0; this.cy = 0; this.curAttr = 0; }
  _scroll() {
    this.cells.copyWithin(0, COLS, COLS * ROWS);
    this.cells.fill(' ', COLS * (ROWS - 1));
    this.attrs.copyWithin(0, COLS, COLS * ROWS);
    this.attrs.fill(0, COLS * (ROWS - 1));
  }
  _nl() { this.cx = 0; this.cy++; if (this.cy >= ROWS) { this.cy = ROWS - 1; this._scroll(); } }
  _put(ch) {
    const wide = isWideChar(ch.codePointAt(0));
    if (this.cx + (wide ? 2 : 1) > COLS) this._nl();   // wrap if it won't fit on the line
    const i = this.cy * COLS + this.cx;
    this.cells[i] = ch;
    this.attrs[i] = this.curAttr;
    if (wide) {
      this.cells[i + 1] = WIDE_CONT;          // right half belongs to this glyph
      this.attrs[i + 1] = this.curAttr;
      this.cx += 2;
    } else {
      this.cx++;
    }
  }
  write(str) {
    for (const ch of str) {
      if (this.esc !== '') { this._escChar(ch); continue; }
      const code = ch.charCodeAt(0);
      if (ch === '\x1b') { this.esc = '\x1b'; }
      else if (ch === '\n') { this._nl(); }
      else if (ch === '\r') { this.cx = 0; }
      else if (ch === '\b' || code === 0x7f) { if (this.cx > 0) this.cx--; }
      else if (ch === '\t') { this.cx = Math.min(COLS - 1, (this.cx + 8) & ~7); }
      else if (code >= 32) { this._put(ch); }
    }
  }
  _escChar(ch) {
    this.esc += ch;
    if (this.esc === '\x1b[') return;       // need more
    if (this.esc.length === 2 && ch !== '[') { this.esc = ''; return; } // non-CSI: drop
    // CSI ends on a letter (or ~)
    if (/[A-Za-z~]/.test(ch)) { this._csi(this.esc); this.esc = ''; }
    else if (this.esc.length > 32) { this.esc = ''; }
  }
  _csi(seq) {
    const body = seq.slice(2);                       // strip ESC[
    const priv = body.startsWith('?');
    const nums = body.replace('?', '').replace(/[A-Za-z~]$/, '');
    const ps = nums.split(';').map(s => s === '' ? 0 : parseInt(s, 10));
    const cmd = seq[seq.length - 1];
    switch (cmd) {
      case 'H': case 'f':  this.cy = Math.min(ROWS-1, Math.max(0,(ps[0]||1)-1));
                           this.cx = Math.min(COLS-1, Math.max(0,(ps[1]||1)-1)); break;
      case 'A': this.cy = Math.max(0, this.cy - (ps[0]||1)); break;
      case 'B': this.cy = Math.min(ROWS-1, this.cy + (ps[0]||1)); break;
      case 'C': this.cx = Math.min(COLS-1, this.cx + (ps[0]||1)); break;
      case 'D': this.cx = Math.max(0, this.cx - (ps[0]||1)); break;
      case 'J': // erase display (2 = whole screen, also home)
        if ((ps[0]||0) === 2) { this.cells.fill(' '); this.attrs.fill(0); this.cx = 0; this.cy = 0; } break;
      case 'K': { // erase line to end
        for (let x = this.cx; x < COLS; x++) { this.cells[this.cy*COLS + x] = ' '; this.attrs[this.cy*COLS + x] = 0; }
        break;
      }
      case 'h': if (priv && ps[0] === 25) this.cursorVisible = true;
                if (priv && ps[0] === 1)  rawMode = true;   // ESC[?1h — slider acts as scroll wheel
                break;
      case 'l': if (priv && ps[0] === 25) this.cursorVisible = false;
                if (priv && ps[0] === 1)  rawMode = false;  // ESC[?1l — slider reports analog position
                break;
      case 'm': // SGR — track bold + reverse (colors map to gray on the device; ignored here)
        for (const n of ps) {
          if (n === 0)       this.curAttr = 0;
          else if (n === 1)  this.curAttr |= ATTR_BOLD;
          else if (n === 4)  this.curAttr |= ATTR_UNDERLINE;   // IME pre-edit text
          else if (n === 7)  this.curAttr |= ATTR_REVERSE;
          else if (n === 22) this.curAttr &= ~ATTR_BOLD;
          else if (n === 24) this.curAttr &= ~ATTR_UNDERLINE;
          else if (n === 27) this.curAttr &= ~ATTR_REVERSE;
        }
        break;
      // ?5000h/l (display mode), ?1h/l (raw), ?7 (wrap) — no-op on a mono screen
    }
  }
  _fillCell(d, x, y, val) {  // paint a whole cell opaque (val 0 or 255)
    for (let dy = 0; dy < CH; dy++) {
      const py = y * CH + dy; if (py >= H) break;
      for (let dx = 0; dx < CW; dx++) {
        const i = (py * W + x * CW + dx) * 4;
        d[i] = d[i+1] = d[i+2] = val; d[i+3] = 255;
      }
    }
  }
  _underline(d, x, y, cells, val) {  // 1px line along the bottom of `cells` cells
    const py = y * CH + 15; if (py >= H) return;
    for (let dx = 0; dx < CW * cells; dx++) {
      const px = x * CW + dx; if (px >= W) break;
      const i = (py * W + px) * 4;
      d[i] = d[i+1] = d[i+2] = val; d[i+3] = 255;
    }
  }
  render() {
    clearGray();   // clears fill (black) + text (transparent) layers
    const img = tctx.createImageData(W, H), d = img.data;   // alpha 0 everywhere
    const wideCells = [];                     // CJK glyphs, drawn via fillText below
    for (let y = 0; y < ROWS; y++) {
      const baseY = y * CH + 13;              // baseline within the 16px cell
      for (let x = 0; x < COLS; x++) {
        const ch = this.cells[y * COLS + x];
        if (ch === WIDE_CONT) continue;       // right half of a wide glyph: skip
        const at = this.attrs[y * COLS + x];
        const reverse = (at & ATTR_REVERSE) !== 0;
        const font = (at & ATTR_BOLD) ? boldFont : sysFont;
        const cp = ch === ' ' ? 32 : ch.codePointAt(0);
        const wide = ch !== ' ' && isWideChar(cp);
        // Wide chars render with the device's GNU Unifont (16px). Until it has
        // loaded, fall back to the host browser's CJK font (drawn via fillText below).
        const jp = wide ? getJpFont() : null;
        if (reverse) {
          this._fillCell(d, x, y, 255);                              // white background
          if (wide) this._fillCell(d, x + 1, y, 255);                // …spanning both cells
          if (ch !== ' ' && !wide) font.drawGlyph(d, W, H, cp, x*CW, baseY, 0);   // black glyph
          else if (jp) jp.drawGlyph(d, W, H, cp, x*CW, y*CH + UNI_BASE, 0);
        } else if (ch !== ' ' && !wide) {
          font.drawGlyph(d, W, H, cp, x*CW, baseY, 255);                          // white glyph
        } else if (jp) {
          jp.drawGlyph(d, W, H, cp, x*CW, y*CH + UNI_BASE, 255);
        }
        // Underline (SGR 4): marks the uncommitted IME pre-edit text.
        if (at & ATTR_UNDERLINE) this._underline(d, x, y, wide ? 2 : 1, reverse ? 0 : 255);
        if (wide && !jp) wideCells.push({ x, y, ch, reverse });   // browser-font fallback
      }
    }
    // Cursor: inverse block over the cell (matches device draw_color 2 / XOR block)
    if (this.cursorVisible) {
      for (let dy = 0; dy < CH; dy++) {
        const py = this.cy * CH + dy; if (py >= H) break;
        for (let dx = 0; dx < CW; dx++) {
          const i = (py * W + this.cx * CW + dx) * 4;
          const on = d[i+3] > 127 && d[i] >= 128;   // currently white?
          const v = on ? 0 : 255;                    // invert
          d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
        }
      }
    }
    tctx.putImageData(img, 0, 0);
    // CJK glyphs: the u8g2 terminal font is Latin-only, so paint wide characters
    // with the host browser's CJK font on top of the composited cell grid.
    if (wideCells.length) {
      tctx.font = CJK_FONT;
      tctx.textBaseline = 'alphabetic';
      tctx.textAlign = 'left';
      for (const wc of wideCells) {
        tctx.fillStyle = wc.reverse ? '#000000' : '#ffffff';
        tctx.fillText(wc.ch, wc.x * CW, wc.y * CH + 13);
      }
    }
    present();
  }
}
const terminal = new MonoTerminal();
window.terminal = terminal;  // for tests
window.getTerminalText = () => {
  let out = '';
  for (let y = 0; y < ROWS; y++) {
    const row = terminal.cells.slice(y*COLS, (y+1)*COLS)
                  .filter(c => c !== WIDE_CONT).join('');   // drop wide-glyph right halves
    out += row.replace(/\s+$/, '') + '\n';
  }
  return out;
};

// ── Mode ──────────────────────────────────────────────────────────────────────
let graphicsMode = false;
function setMode(graphics) {
  graphicsMode = graphics;
  if (!graphics) termDirty = true;    // repaint terminal when returning to CLI
}

// Coalesce terminal repaints to one per animation frame. Apps (e.g. PEM) often
// redraw the screen in several passes per refresh; rendering every write would
// paint intermediate states and flicker (e.g. a reverse-video bar drawn plain
// then re-drawn reversed). Painting once per frame shows only the final state.
let termDirty = false;
function termLoop() {
  if (termDirty && !graphicsMode) { terminal.render(); termDirty = false; }
  requestAnimationFrame(termLoop);
}
requestAnimationFrame(termLoop);

// ════════════════════════════════════════════════════════════════════════════
//  SharedArrayBuffer keyboard channel
// ════════════════════════════════════════════════════════════════════════════
const RING = 2048, KSTATE = 256;
const keySab = new SharedArrayBuffer(64 + RING + KSTATE);
const kMeta  = new Int32Array(keySab, 0, 16);
const kData  = new Uint8Array(keySab, 64, RING);
const kState = new Uint8Array(keySab, 64 + RING, KSTATE);
const _enc   = new TextEncoder();

// kMeta[3] carries the on-screen slider's analog position (0..40, 0xff = not
// touched) so the worker's get_tp_keys() can report it to apps. rawMode mirrors
// the terminal's ESC[?1h/?1l state — in raw mode the slider scrolls (sends arrow
// keys) instead, matching the device firmware's slider→scroll-wheel behaviour.
Atomics.store(kMeta, 3, 255);
let rawMode = false;

function sendKey(str) {
  if (!str) return;
  const bytes = _enc.encode(str);
  let head = Atomics.load(kMeta, 0);
  for (const b of bytes) { kData[head % RING] = b; head++; }
  Atomics.store(kMeta, 0, head);
  Atomics.notify(kMeta, 0);
}
function requestStop() { Atomics.store(kMeta, 2, 1); Atomics.notify(kMeta, 0); }

const HID = { 37:0x50, 39:0x4f, 40:0x51, 38:0x52, 13:0x28, 8:0x2a, 32:0x2c, 27:0x29 };
for (let i = 65; i <= 90; i++) HID[i] = 0x04 + (i - 65);
function setKeyState(keyCode, down) {
  const h = HID[keyCode]; if (h !== undefined) kState[h] = down ? 1 : 0;
}
function keyToData(e) {
  const m = { ArrowUp:'\x1b[A', ArrowDown:'\x1b[B', ArrowRight:'\x1b[C', ArrowLeft:'\x1b[D',
    Backspace:'\x08', Delete:'\x1b[3~', Home:'\x1b[H', End:'\x1b[F',
    PageUp:'\x1b[5~', PageDown:'\x1b[6~', Tab:'\t', Escape:'\x1b', Enter:'\r' };
  if (m[e.key]) return m[e.key];
  // Alt = the emacs "Meta" key: send ESC followed by the key (e.g. Alt+. → ESC .)
  if (e.altKey && e.key.length === 1) return '\x1b' + e.key;
  // Ctrl-Space → NUL (emacs C-Space / set-mark in PEM); also covers Ctrl-@.
  if (e.ctrlKey && (e.code === 'Space' || e.key === ' ' || e.key === '@')) return '\x00';
  if (e.ctrlKey && e.key.length === 1) {
    const c = e.key.toLowerCase().charCodeAt(0) - 96;
    if (c >= 1 && c <= 26) return String.fromCharCode(c);
  }
  if (e.key.length === 1) return e.key;
  return '';
}

window.addEventListener('keydown', e => {
  if (!isRunning) return;
  setKeyState(e.keyCode, true);
  const d = keyToData(e);
  if (d) { e.preventDefault(); sendKey(d); }
});
window.addEventListener('keyup', e => { if (isRunning) setKeyState(e.keyCode, false); });

// ── On-screen buttons (D-pad / A / B) ─────────────────────────────────────────
// Each feeds the same byte stream + HID key-state table as the keyboard, so apps
// can't tell a tap from a keypress. Directional keys (and Backspace) auto-repeat
// while held; A (Enter) fires once per press.
const BTN = {
  'btn-up':    { seq:'\x1b[A', code:38, repeat:true  },
  'btn-down':  { seq:'\x1b[B', code:40, repeat:true  },
  'btn-left':  { seq:'\x1b[D', code:37, repeat:true  },
  'btn-right': { seq:'\x1b[C', code:39, repeat:true  },
  'btn-a':     { seq:'\r',     code:13, repeat:false },   // A → Enter
  'btn-b':     { seq:'\x08',   code:8,  repeat:true  },   // B → Backspace
};
for (const [id, cfg] of Object.entries(BTN)) {
  const el = document.getElementById(id);
  const press = ev => {
    ev.preventDefault();
    if (!isRunning) return;
    el.classList.add('pressed');
    el.setPointerCapture?.(ev.pointerId);
    setKeyState(cfg.code, true);
    sendKey(cfg.seq);
    if (cfg.repeat) cfg._d = setTimeout(() => { cfg._i = setInterval(() => sendKey(cfg.seq), 90); }, 320);
  };
  const release = () => {
    el.classList.remove('pressed');
    setKeyState(cfg.code, false);
    clearTimeout(cfg._d); clearInterval(cfg._i);
  };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', release);
}

// ── On-screen slider ──────────────────────────────────────────────────────────
// Mirrors the device's vertical slide bar. In raw mode it acts like a scroll
// wheel (emits arrow keys per step); otherwise it publishes an analog 0..40
// position to kMeta[3] for apps that poll get_tp_keys() (e.g. home's menu).
const sliderTrack = document.getElementById('slider-track');
const sliderThumb = document.getElementById('slider-thumb');
let sliderStep = -1;
function sliderSet(clientY) {
  const r = sliderTrack.getBoundingClientRect();
  let f = (clientY - r.top) / r.height;
  f = Math.max(0, Math.min(1, f));
  sliderThumb.style.top = (f * 100) + '%';
  const pos = Math.round(f * 40);            // 0 = top, 40 = bottom (device range)
  if (rawMode) {
    const step = Math.floor(pos / 4);        // device slider_step = 4 → one notch
    if (sliderStep >= 0 && step !== sliderStep) {
      // iOS-natural ("content follows finger"): dragging down scrolls up.
      const dir = step > sliderStep ? '\x1b[A' : '\x1b[B';
      for (let n = Math.abs(step - sliderStep); n > 0; n--) sendKey(dir);
    }
    sliderStep = step;
  } else {
    Atomics.store(kMeta, 3, pos); Atomics.notify(kMeta, 0);
  }
}
sliderTrack.addEventListener('pointerdown', ev => {
  ev.preventDefault();
  if (!isRunning) return;
  sliderTrack.classList.add('active');
  sliderTrack.setPointerCapture?.(ev.pointerId);
  sliderStep = -1;
  sliderSet(ev.clientY);
});
sliderTrack.addEventListener('pointermove', ev => {
  if (sliderTrack.classList.contains('active')) sliderSet(ev.clientY);
});
function sliderEnd() {
  sliderTrack.classList.remove('active');
  sliderStep = -1;
  Atomics.store(kMeta, 3, 255); Atomics.notify(kMeta, 0);   // released → untouched
}
sliderTrack.addEventListener('pointerup', sliderEnd);
sliderTrack.addEventListener('pointercancel', sliderEnd);

// ════════════════════════════════════════════════════════════════════════════
//  Worker orchestration
// ════════════════════════════════════════════════════════════════════════════
let worker = null, isRunning = false, selectedApp = null, pendingApp = null;

const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const loadingOverlay = document.getElementById('loading-overlay');
const consoleOut     = document.getElementById('console-out');

function log(msg, isErr) {
  const d = document.createElement('div');
  d.textContent = msg;
  if (isErr) d.style.color = '#ff453a';
  consoleOut.appendChild(d);
  consoleOut.scrollTop = consoleOut.scrollHeight;
}
function setStatus(state, txt) {
  statusText.textContent = txt;
  statusDot.className = 'inline-block w-2 h-2 rounded-full mr-1 align-middle ' + (
    state === 'running' ? 'bg-success animate-pulse' :
    state === 'error'   ? 'bg-red-500' :
    state === 'loading' ? 'bg-yellow-400 animate-pulse' : 'bg-outline'
  );
}

function initWorker() {
  if (!self.crossOriginIsolated) {
    setStatus('error', 'Not isolated');
    log('crossOriginIsolated is false — SharedArrayBuffer unavailable.', true);
    log('Serve with COOP/COEP headers (server.py / coi-serviceworker). Hard reload.', true);
    return;
  }
  try { worker = new Worker('./worker.js'); }
  catch(e) { setStatus('error','Worker failed'); log('Open via http:// not file://', true); return; }

  worker.onmessage = e => {
    const msg = e.data;
    switch (msg.type) {
      case 'ready':
        setStatus('', 'Ready');
        loadingOverlay.classList.remove('show');
        terminal.write('Pocket Deck emulator ready.\r\nTap an app below to run it.\r\n');
        termDirty = true;
        populateApps(msg.apps || []);
        break;
      case 'terminal':
        terminal.write(msg.data);
        if (!graphicsMode) termDirty = true;   // painted by termLoop (coalesced)
        break;
      case 'frame':
        if (graphicsMode) renderFrame(msg.cmds);
        break;
      case 'mode':
        setMode(!!msg.graphics);
        break;
      case 'invert':
        displayInverted = !!msg.value;
        present();            // re-apply to the current frame immediately
        termDirty = true;     // and on the next terminal repaint
        break;
      case 'done':
        isRunning = false;
        setStatus('', 'Done'); log('── finished ──');
        runPending();
        break;
      case 'error':
        isRunning = false;
        setStatus('error', 'Error'); log(msg.message, true);
        setMode(false);
        terminal.write('\r\nERROR:\r\n' + msg.message + '\r\n');
        termDirty = true;
        runPending();
        break;
      case 'clipboard_copy':
        navigator.clipboard?.writeText(msg.data).catch(()=>{});
        break;
    }
  };
  worker.onerror = err => { setStatus('error','Worker error'); log(String(err.message||err), true); };

  setStatus('loading', 'Loading…');
  loadingOverlay.classList.add('show');
  worker.postMessage({ type:'init', sab: keySab });
}

function populateApps(apps) {
  const list = document.getElementById('builtin-list');
  list.innerHTML = '';
  apps.forEach(({ id, label, desc }) => {
    const item = document.createElement('div');
    item.className = 'ios-list-item cursor-pointer hover:bg-white/5';
    item.innerHTML = `
      <div>
        <p class="font-body text-[15px]">${label}</p>
        ${desc ? `<p class="font-label text-[11px] text-on-surface-variant mt-0.5">${desc}</p>` : ''}
      </div>
      <span class="material-symbols-outlined text-outline text-[20px]">chevron_right</span>`;
    item.onclick = () => launchApp(id, item);
    list.appendChild(item);
  });
}

// Tapping an app runs it immediately. If another app is running, request it to
// stop first and remember the choice; the queued app launches once 'done'/'error'
// arrives (the worker is blocked in Atomics.wait until the running app exits).
function launchApp(id, item) {
  if (!worker) return;
  document.querySelectorAll('.ios-list-item.selected').forEach(el => el.classList.remove('selected','bg-secondary-container/30'));
  if (item) item.classList.add('selected', 'bg-secondary-container/30');
  if (isRunning) {
    pendingApp = id;
    setStatus('loading', 'Switching…');
    requestStop();
    return;
  }
  startApp(id);
}

function startApp(id) {
  selectedApp = id;
  rawMode = false; sliderStep = -1; Atomics.store(kMeta, 3, 255);   // reset slider state
  terminal.reset(); resetRenderState(); setMode(false);
  isRunning = true;
  setStatus('running', 'Running…');
  log('Starting ' + id + '…');
  worker.postMessage({ type:'run', app:id, args:[id] });
}

function runPending() {
  if (pendingApp) { const id = pendingApp; pendingApp = null; startApp(id); }
}

document.getElementById('clear-console').addEventListener('click', () => { consoleOut.innerHTML = ''; });

// Paint an initial blank screen, then boot the worker.
clearGray(); present();
initWorker();
</script>
</body>
</html>
